{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow border-0">
      <div class="card-header bg-success text-white">
        <h4><i class="bi bi-file-text"></i> View Whole Paper</h4>
      </div>
      <div class="card-body">
        <form method="get" action="{{ url_for('question_paper') }}">
          <div class="mb-3">
            <label for="date" class="form-label">Date (YYYY-MM-DD)</label>
            <input type="text" class="form-control" id="date" name="date" value="{{ date or '' }}" placeholder="e.g. 2081-01-25">
          </div>
          <div class="mb-3">
            <label for="institution" class="form-label">Institution</label>
            <input type="text" class="form-control" id="institution" name="institution" value="{{ institution or '' }}" placeholder="e.g. NRB">
          </div>
          <div class="mb-3">
            <label for="level" class="form-label">Level</label>
            <input type="text" class="form-control" id="level" name="level" value="{{ level or '' }}" placeholder="e.g. Officer Level">
          </div>
          <div class="mb-3">
            <label for="paper" class="form-label">Paper (optional)</label>
            <input type="text" class="form-control" id="paper" name="paper" value="{{ paper or '' }}" placeholder="e.g. First Paper">
          </div>
          <button type="submit" class="btn btn-success w-100"><i class="bi bi-search"></i> Show Paper</button>
        </form>
        <p class="mt-3 text-muted small">At least one field is required.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
