{% extends "base.html" %}
{% block content %}
<h2>📂 Browse by Chapter</h2>
<div class="row">
  <div class="col">
    <div class="table-responsive">
      <table class="table table-striped table-hover">
        <thead>
          <tr>
            <th>Chapter</th>
            <th>Subject</th>
            <th>Paper</th>
            <th>Group</th>
            <th>Questions</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for ch in chapters %}
          <tr>
            <td>{{ ch.name }}</td>
            <td>{{ ch.subject }}</td>
            <td>{{ ch.paper }}</td>
            <td>{{ ch.group }}</td>
            <td><span class="badge bg-primary">{{ ch.count }}</span></td>
            <td>
              <a href="{{ url_for('questions_by_chapter', chapter_code=ch.name) }}" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-eye"></i> View
              </a>
            </td>
          </tr>
          {% else %}
          <tr><td colspan="6" class="text-muted">No chapters found.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
